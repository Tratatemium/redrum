<html>

<head>
  <script type="module" src="./src/main.js"></script>
</head>

<body>
  <a-scene>

    <a-assets>
      <a-asset-item id="lamp-ceiling" src="/models/Lamp_Ceiling.glb"></a-asset-item>
      <a-asset-item id="lamp-wall" src="/models/Lamp_Wall.glb"></a-asset-item>

      <a-asset-item id="corridor" src="/models/corridor/Corridor_01.glb"></a-asset-item>
      <a-asset-item id="door" src="/models/corridor/Door.glb"></a-asset-item>
      <a-asset-item id="twins" src="/models/corridor/Twins.glb"></a-asset-item>

      <a-asset-item id="room1" src="/rooms/room-1/assets/room-test.glb"></a-asset-item>
      <a-asset-item id="room-2" src="/models/room-2/room.glb"></a-asset-item>
    </a-assets>

    <!-- LIGHT -->
    <a-light type="ambient" intensity="0.1"></a-light>

    <!-- NAVMESH -->
    <!-- <a-plane id="navmesh" width="17.9" height="2.9" position="9 -0.001 1.5" rotation="-90 0 0" nav-mesh></a-plane> -->

    <!-- PLAYER -->
    <a-entity id="player-rig" position="1 0 1.5" rotation="0 -90 0" movement-controls="constrainToNavMesh: true">
      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor raycaster="objects: .clickable" cursor="rayOrigin: mouse; fuse: false"></a-cursor>
      </a-entity>
    </a-entity>

    <a-sky color="#1a0000"></a-sky>

    <a-entity id="corridor-anchor" position="0 0 0">
      <include file="./rooms/corridor/corridor.html"></include>
    </a-entity>

    <a-entity id="room-1-anchor" position="8 0 -4.760" rotation="0 180 0">
      <include file="./rooms/room-1/room-1.html"></include>
    </a-entity>

    <a-entity id="room-2-anchor" position="0 0 5.020">
      <include file="./rooms/room-2/room-2.html"></include>
    </a-entity>

  </a-scene>
</body>

</html>
